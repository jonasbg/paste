name: PASTE CI/CD Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  helm-and-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Enable docker layer caching
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-flags: --debug

      # # Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Docker Metadata action
        uses: docker/metadata-action@v4.3.0
        id: meta
        with:
          images: ${{ vars.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=dev,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}

      # Login to GitHub Container Registry. Runs on main/manual dispatch and on
      # same-repo PRs (which can push the :dev tag). Fork PRs have no registry
      # write access, so login is skipped and the build stays validation-only.
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image with caching
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build-docker-image
        with:
          context: .
          platforms: linux/amd64 #, linux/arm64
          # Push on main / manual dispatch (:latest) and on same-repo PRs (:dev).
          # Fork PRs can't authenticate to the registry, so those stay build-only.
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # # Move cache to prevent it from growing indefinitely
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Helm setup
      - name: Install Helm
        if: github.ref == 'refs/heads/main'
        uses: azure/setup-helm@v3

      # Push Helm chart to GitHub Container Registry
      - name: Push Helm chart
        if: github.ref == 'refs/heads/main'
        run: |
          helm pull oci://${{ vars.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/paste
          file=$(ls paste-*.tgz)
          REGISTRY_VERSION=$(echo $file | grep -oP 'paste-\K[0-9]+\.[0-9]+\.[0-9]+')
          DECLARED_VERSION=$(grep -oP '^version: \K[0-9]+\.[0-9]+\.[0-9]+' .helm/Chart.yaml)
          IFS=. read -r DMAJ DMIN _ <<< "$DECLARED_VERSION"
          IFS=. read -r RMAJ RMIN RPAT <<< "$REGISTRY_VERSION"
          # If Chart.yaml declares a higher major.minor than the registry holds,
          # this is the first publish of that series — ship the declared version
          # verbatim. Otherwise bump the patch from the registry's latest.
          if [ "$DMAJ" -gt "$RMAJ" ] || { [ "$DMAJ" -eq "$RMAJ" ] && [ "$DMIN" -gt "$RMIN" ]; }; then
            NEW_VERSION="$DECLARED_VERSION"
          else
            NEW_VERSION="$RMAJ.$RMIN.$((RPAT + 1))"
          fi
          echo "Registry: $REGISTRY_VERSION | Declared: $DECLARED_VERSION | Publishing: $NEW_VERSION"
          sed -i -E "s/^version: [0-9]+\.[0-9]+\.[0-9]+/version: $NEW_VERSION/" .helm/Chart.yaml

          DIGEST=${{steps.build-docker-image.outputs.digest}}
          DIGEST="latest@$DIGEST"
          sed -i "s/tag: \"latest\"/tag: \"$DIGEST\"/" .helm/values.yaml

          echo ${{ env.GITHUB_TOKEN }} | helm registry login ${{ vars.REGISTRY }} -u ${{ github.actor }} --password-stdin
          cd .helm
          helm package .

          helm push *.tgz oci://${{ vars.REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
